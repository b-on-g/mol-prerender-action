name: "$mol Prerender for SEO"
description: "Prerender $mol SPA pages with Puppeteer for search engine indexing. Auto-detects build dir and root selector from index.html."

inputs:
  base-url:
    description: "Production URL for sitemap.xml (e.g. https://example.github.io/app/)"
    required: true
  screens:
    description: |
      Screen IDs to prerender, one per line. Each screen is navigated via route-key.
      Empty = only index.html. Title and description are extracted from the rendered page.
      Example:
        campaign
        shop
        leaderboard
    required: false
    default: ""
  route-format:
    description: 'URL routing format: "#!" (hash, default) or "?" (query string)'
    required: false
    default: "#!"
  route-key:
    description: "URL parameter key for screen routing"
    required: false
    default: "screen"
  viewport:
    description: "Viewport size as WIDTHxHEIGHT"
    required: false
    default: "430x932"
  timeout:
    description: "Render wait timeout in milliseconds"
    required: false
    default: "15000"
  folder:
    description: "Path to the build output directory containing index.html (e.g. bog/blitz/blog/-). If omitted, auto-detects by searching for */app/-/index.html."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Detect build directory
      id: detect
      shell: bash
      run: |
        FOLDER="${{ inputs.folder }}"
        if [ -n "$FOLDER" ]; then
          BUILD_DIR="$FOLDER"
          if [ ! -f "$BUILD_DIR/index.html" ]; then
            echo "::error::index.html not found in specified folder: $BUILD_DIR"
            exit 1
          fi
        else
          # Find index.html with mol_view_root attribute
          BUILD_DIR=$(find . -path '*/-/index.html' -exec grep -l 'mol_view_root' {} \; | head -1 | xargs dirname)
          if [ -z "$BUILD_DIR" ]; then
            echo "::error::Could not find $mol build directory (looking for */-/index.html with mol_view_root)"
            exit 1
          fi
        fi
        echo "build-dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"

        # Extract root selector from index.html
        ROOT_FQN=$(grep -oP 'mol_view_root="\$[^"]+' "$BUILD_DIR/index.html" | head -1 | sed 's/mol_view_root="//')
        echo "root-fqn=$ROOT_FQN" >> "$GITHUB_OUTPUT"
        echo "Detected: build-dir=$BUILD_DIR root=$ROOT_FQN"

    - name: Compute cache key
      id: cache-key
      shell: bash
      run: |
        BUILD_DIR="${{ steps.detect.outputs.build-dir }}"
        HASH=$(cat "$BUILD_DIR/web.js" "$BUILD_DIR/web.css" 2>/dev/null | sha256sum | cut -d' ' -f1)
        SCREENS_HASH=$(echo "${{ inputs.screens }}${{ inputs.base-url }}${{ inputs.route-format }}${{ inputs.route-key }}${{ inputs.viewport }}" | sha256sum | cut -d' ' -f1)
        echo "key=prerender-${HASH}-${SCREENS_HASH}" >> "$GITHUB_OUTPUT"

    - name: Restore prerender cache
      id: prerender-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.detect.outputs.build-dir }}/*.html
          ${{ steps.detect.outputs.build-dir }}/sitemap.xml
          ${{ steps.detect.outputs.build-dir }}/robots.txt
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install Puppeteer
      if: steps.prerender-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm install --prefix "${{ github.action_path }}" puppeteer

    - name: Prerender pages
      if: steps.prerender-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        node "${{ github.action_path }}/prerender.mjs" \
          --build-dir="${{ steps.detect.outputs.build-dir }}" \
          --root-fqn="${{ steps.detect.outputs.root-fqn }}" \
          --base-url="${{ inputs.base-url }}" \
          --screens="${{ inputs.screens }}" \
          --route-format="${{ inputs.route-format }}" \
          --route-key="${{ inputs.route-key }}" \
          --viewport="${{ inputs.viewport }}" \
          --timeout="${{ inputs.timeout }}"
